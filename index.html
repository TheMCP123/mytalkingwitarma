<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Витёк Арматура</title>

  <style>
    * { box-sizing: border-box; }
    :root {
      color-scheme: dark;
      --bg: #080a10;
      --accent-1: #4f8cff;
      --accent-2: #8f5cff;
      --panel: #0c0f18;
      --text: #f5f7fb;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 0%, color-mix(in srgb, var(--accent-1) 24%, transparent), transparent 34%),
        radial-gradient(circle at 90% 20%, color-mix(in srgb, var(--accent-2) 18%, transparent), transparent 28%),
        var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .app {
      width: min(100%, 520px);
      height: min(760px, calc(100vh - 36px));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 28px;
      background: color-mix(in srgb, var(--panel) 76%, transparent);
      box-shadow: 0 24px 70px rgba(0,0,0,.5);
      backdrop-filter: blur(18px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      height: 82px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,.09);
      background: rgba(255,255,255,.035);
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      object-fit: cover;
      image-rendering: pixelated;
      background: #fff;
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 10px 28px color-mix(in srgb, var(--accent-1) 24%, transparent);
      flex-shrink: 0;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -.03em;
      font-weight: 800;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: 86%;
      padding: 12px 14px 8px;
      border-radius: 18px;
      white-space: pre-wrap;
      line-height: 1.38;
      font-size: 15px;
      overflow-wrap: anywhere;
      position: relative;
    }

    .bubble::after {
      content: attr(data-time);
      display: block;
      margin-top: 5px;
      font-size: 11px;
      line-height: 1;
      opacity: .55;
      white-space: nowrap;
    }

    .bot {
      align-self: flex-start;
      background: rgba(255,255,255,.09);
      border-bottom-left-radius: 6px;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border-bottom-right-radius: 6px;
    }

    form {
      display: flex;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid rgba(255,255,255,.09);
      background: rgba(255,255,255,.035);
      align-items: flex-end;
    }

    .input-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .file-chip {
      width: fit-content;
      max-width: 100%;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.82);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(0,0,0,.28);
      color: #fff;
      border-radius: 16px;
      padding: 14px 15px;
      outline: none;
      font: inherit;
    }

    input[type="text"]:focus { border-color: rgba(120,160,255,.75); }

    button {
      width: 50px;
      height: 50px;
      border: 0;
      border-radius: 16px;
      background: var(--text);
      color: var(--panel);
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      flex-shrink: 0;
    }

    .file-btn {
      background: rgba(255,255,255,.09);
      color: white;
      border: 1px solid rgba(255,255,255,.12);
      font-size: 18px;
    }

    button:disabled { opacity: .55; cursor: not-allowed; }


    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: rgba(255,255,255,.09);
      color: white;
      border: 1px solid rgba(255,255,255,.12);
      font-size: 17px;
    }

    .customizer {
      display: none;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,.09);
      background: rgba(255,255,255,.035);
    }

    .customizer.open {
      display: grid;
    }

    .color-item {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 11px;
      color: rgba(255,255,255,.68);
    }

    .color-item input {
      width: 100%;
      height: 34px;
      padding: 0;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 10px;
      background: transparent;
      cursor: pointer;
    }

    .reset-colors {
      width: 100%;
      height: 34px;
      border-radius: 10px;
      font-size: 12px;
      background: rgba(255,255,255,.09);
      color: white;
      border: 1px solid rgba(255,255,255,.12);
    }

    @media (max-width: 560px) {
      body { padding: 0; }
      .app { height: 100vh; border-radius: 0; width: 100%; border: 0; }
      .customizer { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>

<body>
  <main class="app">
    <header>
      <img class="avatar" alt="Витёк Арматура" src="assets/vitek-avatar.png" />
      <h1>Витёк Арматура</h1>
      <div class="header-actions">
        <button id="downloadChat" class="icon-btn" type="button" title="Скачать диалог">⬇</button>
        <button id="customizeToggle" class="icon-btn" type="button" title="Настроить цвета">🎨</button>
      </div>
    </header>

    <section id="customizer" class="customizer">
      <label class="color-item">Фон<input id="bgColor" type="color" value="#080a10"></label>
      <label class="color-item">Кнопки 1<input id="accent1Color" type="color" value="#4f8cff"></label>
      <label class="color-item">Кнопки 2<input id="accent2Color" type="color" value="#8f5cff"></label>
      <label class="color-item">Панель<input id="panelColor" type="color" value="#0c0f18"></label>
      <label class="color-item">Текст<input id="textColor" type="color" value="#f5f7fb"></label>
      <button id="resetColors" class="reset-colors" type="button">Сброс</button>
    </section>

    <section class="messages" id="messages"></section>

    <form id="form">
      <button id="fileButton" class="file-btn" type="button" title="Прикрепить файл">📎</button>
      <input id="fileInput" type="file" hidden accept=".txt,.json,.yml,.yaml,.log,.html,text/plain,application/json,text/html" />

      <div class="input-wrap">
        <div id="fileChip" class="file-chip" hidden title="Нажми, чтобы убрать файл"></div>
        <input id="input" type="text" autocomplete="off" placeholder="Напиши Витьку..." />
      </div>

      <button id="send" type="submit">➜</button>
    </form>
  </main>

  <script>
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const messagesEl = document.getElementById('messages');
    const fileButton = document.getElementById('fileButton');
    const fileInput = document.getElementById('fileInput');
    const fileChip = document.getElementById('fileChip');
    const downloadChat = document.getElementById('downloadChat');
    const customizeToggle = document.getElementById('customizeToggle');
    const customizer = document.getElementById('customizer');
    const resetColors = document.getElementById('resetColors');

    const colorInputs = {
      bg: document.getElementById('bgColor'),
      accent1: document.getElementById('accent1Color'),
      accent2: document.getElementById('accent2Color'),
      panel: document.getElementById('panelColor'),
      text: document.getElementById('textColor')
    };

    const history = [];
    const dialogLog = [];
    const MAX_FILE_SIZE = 50 * 1024;
    const ALLOWED_EXTENSIONS = ['txt', 'json', 'yml', 'yaml', 'log', 'html'];

    let selectedVoice = null;
    let voiceReady = false;
    let attachedFile = null;

    const defaultColors = {
      bg: '#080a10',
      accent1: '#4f8cff',
      accent2: '#8f5cff',
      panel: '#0c0f18',
      text: '#f5f7fb'
    };

    function applyColors(colors) {
      const c = { ...defaultColors, ...colors };
      document.documentElement.style.setProperty('--bg', c.bg);
      document.documentElement.style.setProperty('--accent-1', c.accent1);
      document.documentElement.style.setProperty('--accent-2', c.accent2);
      document.documentElement.style.setProperty('--panel', c.panel);
      document.documentElement.style.setProperty('--text', c.text);

      colorInputs.bg.value = c.bg;
      colorInputs.accent1.value = c.accent1;
      colorInputs.accent2.value = c.accent2;
      colorInputs.panel.value = c.panel;
      colorInputs.text.value = c.text;
    }

    function saveColors() {
      const colors = {
        bg: colorInputs.bg.value,
        accent1: colorInputs.accent1.value,
        accent2: colorInputs.accent2.value,
        panel: colorInputs.panel.value,
        text: colorInputs.text.value
      };

      localStorage.setItem('vitekColors', JSON.stringify(colors));
      applyColors(colors);
    }

    function loadColors() {
      try {
        const saved = JSON.parse(localStorage.getItem('vitekColors') || 'null');
        applyColors(saved || defaultColors);
      } catch {
        applyColors(defaultColors);
      }
    }

    function getTime() {
      return new Date().toLocaleTimeString('ru-RU', {
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function addBubble(text, type, saveToDialog = true) {
      const el = document.createElement('div');
      el.className = 'bubble ' + type;
      el.dataset.time = getTime();
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      if (saveToDialog) {
        dialogLog.push({ role: type === 'user' ? 'user' : 'bot', text });
      }

      return el;
    }

    function setBubbleText(el, text) {
      el.textContent = text;
      el.dataset.time = getTime();
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addToDialog(role, text) {
      dialogLog.push({ role, text });
    }

    function downloadDialog() {
      if (!dialogLog.length) {
        addBubble('Скачивать нечего, диалога нет.', 'bot');
        return;
      }

      const content = dialogLog
        .map(item => `${item.role === 'bot' ? 'ВИТЁК' : 'ТЫ'}: ${item.text}`)
        .join('

');

      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `vitek-dialog-${new Date().toISOString().slice(0, 10)}.txt`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      return (bytes / 1024).toFixed(1) + ' KB';
    }

    function getExtension(filename) {
      const parts = filename.toLowerCase().split('.');
      return parts.length > 1 ? parts.pop() : '';
    }

    function clearAttachedFile() {
      attachedFile = null;
      fileInput.value = '';
      fileChip.hidden = true;
      fileChip.textContent = '';
    }

    function buildMessageWithFile(userText) {
      const text = userText || 'Посмотри файл.';

      if (!attachedFile) return text;

      return `${text}\n\n[Пользователь прикрепил файл]\nИмя: ${attachedFile.name}\nРазмер: ${formatBytes(attachedFile.size)}\nТип: .${attachedFile.ext}\n\nСодержимое файла:\n\`\`\`${attachedFile.ext}\n${attachedFile.content}\n\`\`\``;
    }

    function cleanReply(text) {
      return String(text || '')
        .replace(/\([^)]{1,120}\)/g, '')
        .replace(/\*[^*]{1,120}\*/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function loadVoice() {
      if (!('speechSynthesis' in window)) return;

      const voices = speechSynthesis.getVoices();

      selectedVoice =
        voices.find(v => v.lang === 'ru-RU') ||
        voices.find(v => v.lang && v.lang.startsWith('ru')) ||
        voices.find(v => v.lang && v.lang.startsWith('en')) ||
        voices[0] ||
        null;
    }

    function unlockVoice() {
      if (!('speechSynthesis' in window) || voiceReady) return;

      loadVoice();

      const test = new SpeechSynthesisUtterance(' ');
      test.volume = 0;

      speechSynthesis.speak(test);
      speechSynthesis.cancel();

      voiceReady = true;
    }

    function cleanForVoice(text) {
      return String(text || '')
        .replace(/[*_`~#>]/g, '')
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
        .replace(/https?:\/\/\S+/g, '')
        .replace(/[\u{1F300}-\u{1FAFF}]/gu, '')
        .replace(/\s+/g, ' ')
        .trim()
        .slice(0, 700);
    }

    function speakVitek(text) {
      if (!('speechSynthesis' in window)) return;

      const cleanText = cleanForVoice(text);
      if (!cleanText) return;

      loadVoice();
      speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(cleanText);

      utterance.lang = 'ru-RU';
      utterance.rate = 0.82;
      utterance.pitch = 0.28;
      utterance.volume = 1;

      if (selectedVoice) utterance.voice = selectedVoice;

      speechSynthesis.speak(utterance);
    }

    if ('speechSynthesis' in window) {
      loadVoice();
      speechSynthesis.onvoiceschanged = loadVoice;
    }

    loadColors();

    Object.values(colorInputs).forEach(input => {
      input.addEventListener('input', saveColors);
    });

    customizeToggle.addEventListener('click', () => {
      customizer.classList.toggle('open');
    });

    resetColors.addEventListener('click', () => {
      localStorage.removeItem('vitekColors');
      applyColors(defaultColors);
    });

    downloadChat.addEventListener('click', downloadDialog);

    fileButton.addEventListener('click', () => fileInput.click());

    fileChip.addEventListener('click', () => {
      clearAttachedFile();
      addBubble('Файл убрал.', 'bot');
    });

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;

      const ext = getExtension(file.name);

      if (!ALLOWED_EXTENSIONS.includes(ext)) {
        clearAttachedFile();
        addBubble('Витёк пока ест только .TXT .JSON .YML .LOG .HTML до 50 KB.', 'bot');
        return;
      }

      if (file.size > MAX_FILE_SIZE) {
        clearAttachedFile();
        addBubble('Файл жирный. Максимум 50 KB, не корми DeepSeek простынёй.', 'bot');
        return;
      }

      try {
        const content = await file.text();

        attachedFile = {
          name: file.name,
          size: file.size,
          ext,
          content
        };

        fileChip.textContent = `📎 ${file.name} · ${formatBytes(file.size)} · нажми, чтобы убрать`;
        fileChip.hidden = false;
      } catch (err) {
        clearAttachedFile();
        addBubble('Не смог прочитать файл. Кинь нормальный текстовый файл.', 'bot');
      }
    });

    addBubble('Здарова мабой.', 'bot');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      unlockVoice();

      const text = input.value.trim();
      if (!text && !attachedFile) return;

      input.value = '';
      send.disabled = true;
      fileButton.disabled = true;

      const displayText = attachedFile
        ? `${text || 'Посмотри файл.'}\n📎 ${attachedFile.name}`
        : text;

      const messageForApi = buildMessageWithFile(text);
      const outgoingMessages = [
        ...history.slice(-6),
        { role: 'user', content: messageForApi }
      ];

      addBubble(displayText, 'user');

      history.push({
        role: 'user',
        content: displayText
      });

      clearAttachedFile();

      const wait = addBubble('Витёк печатает...', 'bot', false);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            messages: outgoingMessages
          })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.error || 'API не ответил');
        }

        const reply = cleanReply(data.reply || 'Не придумал что сказать.');
        setBubbleText(wait, reply);
        addToDialog('bot', reply);

        history.push({
          role: 'assistant',
          content: reply
        });

        speakVitek(reply);
      } catch (err) {
        setBubbleText(wait, 'Ошибка: ' + err.message);
        addToDialog('bot', 'Ошибка: ' + err.message);
      } finally {
        send.disabled = false;
        fileButton.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
