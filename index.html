<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Витёк Арматура</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      color-scheme: dark;
      --bg1: #080a10;
      --bg2: #111522;
      --panel: rgba(12, 15, 24, .78);
      --panel2: rgba(255,255,255,.04);
      --text: #f5f7fb;
      --muted: rgba(245,247,251,.62);
      --accent1: #4f8cff;
      --accent2: #8f5cff;
      --bot: rgba(255,255,255,.09);
      --border: rgba(255,255,255,.12);
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 0%, color-mix(in srgb, var(--accent1) 28%, transparent), transparent 34%),
        radial-gradient(circle at 90% 20%, color-mix(in srgb, var(--accent2) 22%, transparent), transparent 28%),
        var(--bg1);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .app {
      width: min(100%, 520px);
      height: min(760px, calc(100vh - 36px));
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 24px 70px rgba(0,0,0,.5);
      backdrop-filter: blur(18px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      height: 82px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,.09);
      background: var(--panel2);
      flex-shrink: 0;
    }
    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      object-fit: cover;
      image-rendering: pixelated;
      background: #fff;
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 10px 28px rgba(91, 141, 255, .24);
      flex-shrink: 0;
    }
    h1 { margin: 0; font-size: 22px; letter-spacing: -.03em; font-weight: 800; }
    .head-actions { margin-left: auto; display: flex; gap: 8px; }
    .icon-btn {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      background: rgba(255,255,255,.08);
      color: var(--text);
      cursor: pointer;
      font-size: 17px;
      display: grid;
      place-items: center;
      padding: 0;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: rgba(255,255,255,.13); }
    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    .msg-wrap { display: flex; flex-direction: column; gap: 4px; max-width: 86%; }
    .msg-wrap.bot-wrap { align-self: flex-start; }
    .msg-wrap.user-wrap { align-self: flex-end; align-items: flex-end; }
    .bubble {
      padding: 12px 14px;
      border-radius: 18px;
      white-space: pre-wrap;
      line-height: 1.38;
      font-size: 15px;
      overflow-wrap: anywhere;
    }
    .bot { background: var(--bot); border-bottom-left-radius: 6px; }
    .user { background: linear-gradient(135deg, var(--accent1), var(--accent2)); border-bottom-right-radius: 6px; }
    .time { font-size: 11px; color: var(--muted); padding: 0 6px; user-select: none; }
    .file-pill {
      display: none;
      margin: 0 14px 8px;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,.11);
      background: rgba(255,255,255,.06);
      border-radius: 12px;
      color: var(--muted);
      font-size: 13px;
      align-items: center;
      gap: 8px;
    }
    .file-pill.show { display: flex; }
    .file-pill button {
      width: auto;
      height: auto;
      padding: 2px 7px;
      border-radius: 9px;
      font-size: 13px;
      margin-left: auto;
    }
    form {
      display: flex;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid rgba(255,255,255,.09);
      background: var(--panel2);
      flex-shrink: 0;
    }
    input[type="text"] {
      flex: 1;
      min-width: 0;
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(0,0,0,.28);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 15px;
      outline: none;
      font: inherit;
    }
    input[type="text"]:focus { border-color: color-mix(in srgb, var(--accent1) 75%, white); }
    .send-btn {
      width: 50px;
      border: 0;
      border-radius: 16px;
      background: var(--text);
      color: #111522;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      flex-shrink: 0;
    }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .customizer {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(0,0,0,.52);
      place-items: center;
      padding: 18px;
    }
    .customizer.show { display: grid; }
    .customizer-card {
      width: min(100%, 420px);
      background: #111522;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
    }
    .customizer-card h2 { margin: 0 0 14px; font-size: 20px; }
    .color-row { display: grid; grid-template-columns: 1fr 62px; align-items: center; gap: 12px; margin: 10px 0; color: var(--text); }
    .color-row input { width: 62px; height: 38px; border: 0; border-radius: 10px; background: transparent; cursor: pointer; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-actions button { flex: 1; width: auto; height: 42px; border-radius: 14px; border: 0; font-weight: 800; cursor: pointer; }
    .primary { background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; }
    .secondary { background: rgba(255,255,255,.1); color: #fff; }
    @media (max-width: 560px) {
      body { padding: 0; }
      .app { height: 100vh; border-radius: 0; width: 100%; border: 0; }
      h1 { font-size: 19px; }
      header { padding: 14px; }
      .head-actions { gap: 6px; }
      .icon-btn { width: 38px; height: 38px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <img class="avatar" alt="Витёк Арматура" src="assets/vitek-avatar.png" onerror="this.style.display='none'" />
      <h1>Витёк Арматура</h1>
      <div class="head-actions">
        <button id="voiceToggle" class="icon-btn" type="button" title="Голос">🔊</button>
        <button id="fileBtn" class="icon-btn" type="button" title="Файл">📎</button>
        <button id="downloadBtn" class="icon-btn" type="button" title="Скачать диалог">⬇</button>
        <button id="themeBtn" class="icon-btn" type="button" title="Цвета">🎨</button>
        <button id="clearBtn" class="icon-btn" type="button" title="Очистить">🗑</button>
      </div>
    </header>

    <section class="messages" id="messages"></section>

    <div id="filePill" class="file-pill">
      <span id="fileName"></span>
      <button id="removeFile" class="secondary" type="button">×</button>
    </div>

    <form id="form">
      <input id="input" type="text" autocomplete="off" placeholder="Напиши Витьку..." />
      <button id="send" class="send-btn" type="submit">➜</button>
    </form>

    <input id="fileInput" type="file" accept=".txt,.json,.yml,.yaml,.log,.html,text/plain,application/json,text/html" hidden />
  </main>

  <div id="customizer" class="customizer" aria-hidden="true">
    <div class="customizer-card">
      <h2>Цвета</h2>
      <label class="color-row">Фон 1 <input id="cBg1" type="color" value="#080a10"></label>
      <label class="color-row">Фон 2 <input id="cBg2" type="color" value="#111522"></label>
      <label class="color-row">Панель <input id="cPanel" type="color" value="#0c0f18"></label>
      <label class="color-row">Кнопка 1 <input id="cAccent1" type="color" value="#4f8cff"></label>
      <label class="color-row">Кнопка 2 <input id="cAccent2" type="color" value="#8f5cff"></label>
      <label class="color-row">Текст <input id="cText" type="color" value="#f5f7fb"></label>
      <div class="modal-actions">
        <button id="resetTheme" class="secondary" type="button">Сброс</button>
        <button id="closeTheme" class="primary" type="button">Готово</button>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const messagesEl = document.getElementById('messages');
    const voiceToggle = document.getElementById('voiceToggle');
    const fileBtn = document.getElementById('fileBtn');
    const fileInput = document.getElementById('fileInput');
    const filePill = document.getElementById('filePill');
    const fileName = document.getElementById('fileName');
    const removeFile = document.getElementById('removeFile');
    const downloadBtn = document.getElementById('downloadBtn');
    const themeBtn = document.getElementById('themeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const customizer = document.getElementById('customizer');
    const closeTheme = document.getElementById('closeTheme');
    const resetTheme = document.getElementById('resetTheme');

    const history = [];
    const transcript = [];
    let attachedFile = null;
    let selectedVoice = null;
    let voiceReady = false;
    let voiceEnabled = true;

    const allowedExt = ['txt', 'json', 'yml', 'yaml', 'log', 'html'];
    const maxFileSize = 50 * 1024;

    function nowTime() {
      return new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }

    function addBubble(text, type) {
      const wrap = document.createElement('div');
      wrap.className = 'msg-wrap ' + (type === 'user' ? 'user-wrap' : 'bot-wrap');

      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + type;
      bubble.textContent = text;

      const time = document.createElement('div');
      time.className = 'time';
      time.textContent = nowTime();

      wrap.appendChild(bubble);
      wrap.appendChild(time);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function cleanReply(text) {
      return String(text || '')
        .replace(/\([^)]{1,120}\)/g, '')
        .replace(/\*[^*]{1,120}\*/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function cleanForVoice(text) {
      return String(text || '')
        .replace(/[\*_`~#>]/g, '')
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
        .replace(/https?:\/\/\S+/g, '')
        .replace(/[\u{1F300}-\u{1FAFF}]/gu, '')
        .replace(/\s+/g, ' ')
        .trim()
        .slice(0, 700);
    }

    function loadVoice() {
      if (!('speechSynthesis' in window)) return;
      const voices = speechSynthesis.getVoices();
      selectedVoice =
        voices.find(v => v.lang === 'ru-RU') ||
        voices.find(v => v.lang && v.lang.startsWith('ru')) ||
        voices.find(v => v.lang && v.lang.startsWith('en')) ||
        voices[0] ||
        null;
    }

    function unlockVoice() {
      if (!('speechSynthesis' in window) || voiceReady) return;
      loadVoice();
      const test = new SpeechSynthesisUtterance(' ');
      test.volume = 0;
      speechSynthesis.speak(test);
      speechSynthesis.cancel();
      voiceReady = true;
    }

    function speakVitek(text) {
      if (!voiceEnabled) return;
      if (!('speechSynthesis' in window)) return;
      const cleanText = cleanForVoice(text);
      if (!cleanText) return;
      loadVoice();
      speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(cleanText);
      utterance.lang = 'ru-RU';
      utterance.rate = 0.82;
      utterance.pitch = 0.28;
      utterance.volume = 1;
      if (selectedVoice) utterance.voice = selectedVoice;
      speechSynthesis.speak(utterance);
    }

    function setAttachedFile(file) {
      attachedFile = file;
      if (file) {
        fileName.textContent = '📎 ' + file.name + ' (' + Math.ceil(file.size / 1024) + ' KB)';
        filePill.classList.add('show');
      } else {
        fileName.textContent = '';
        filePill.classList.remove('show');
        fileInput.value = '';
      }
    }

    function fileToText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(new Error('Не смог прочитать файл'));
        reader.readAsText(file, 'UTF-8');
      });
    }

    function downloadDialog() {
      if (!transcript.length) return;
      const text = transcript.map(item => `${item.role}: ${item.text}`).join('\n\n') + '\n';
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'vitek-dialog.txt';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function applyTheme(theme) {
      const root = document.documentElement;
      if (theme.bg1) root.style.setProperty('--bg1', theme.bg1);
      if (theme.bg2) root.style.setProperty('--bg2', theme.bg2);
      if (theme.panel) root.style.setProperty('--panel', hexToRgba(theme.panel, .78));
      if (theme.text) root.style.setProperty('--text', theme.text);
      if (theme.accent1) root.style.setProperty('--accent1', theme.accent1);
      if (theme.accent2) root.style.setProperty('--accent2', theme.accent2);
    }

    function hexToRgba(hex, alpha) {
      const h = hex.replace('#', '');
      const r = parseInt(h.substring(0, 2), 16);
      const g = parseInt(h.substring(2, 4), 16);
      const b = parseInt(h.substring(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function saveTheme() {
      const theme = {
        bg1: document.getElementById('cBg1').value,
        bg2: document.getElementById('cBg2').value,
        panel: document.getElementById('cPanel').value,
        accent1: document.getElementById('cAccent1').value,
        accent2: document.getElementById('cAccent2').value,
        text: document.getElementById('cText').value
      };
      localStorage.setItem('vitekTheme', JSON.stringify(theme));
      applyTheme(theme);
    }

    function loadThemeFromStorage() {
      try {
        const theme = JSON.parse(localStorage.getItem('vitekTheme') || '{}');
        if (!theme || !Object.keys(theme).length) return;
        if (theme.bg1) document.getElementById('cBg1').value = theme.bg1;
        if (theme.bg2) document.getElementById('cBg2').value = theme.bg2;
        if (theme.panel) document.getElementById('cPanel').value = theme.panel;
        if (theme.accent1) document.getElementById('cAccent1').value = theme.accent1;
        if (theme.accent2) document.getElementById('cAccent2').value = theme.accent2;
        if (theme.text) document.getElementById('cText').value = theme.text;
        applyTheme(theme);
      } catch (e) {}
    }

    if ('speechSynthesis' in window) {
      loadVoice();
      speechSynthesis.onvoiceschanged = loadVoice;
    }

    loadThemeFromStorage();
    addBubble('Здарова мабой.', 'bot');
    transcript.push({ role: 'ВИТЁК', text: 'Здарова мабой.' });

    voiceToggle.addEventListener('click', () => {
      voiceEnabled = !voiceEnabled;
      voiceToggle.textContent = voiceEnabled ? '🔊' : '🔇';
      if (!voiceEnabled && 'speechSynthesis' in window) speechSynthesis.cancel();
    });

    fileBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      const ext = file.name.split('.').pop().toLowerCase();
      if (!allowedExt.includes(ext)) {
        alert('Можно только .txt .json .yml .yaml .log .html');
        fileInput.value = '';
        return;
      }
      if (file.size > maxFileSize) {
        alert('Файл слишком большой. Максимум 50 KB.');
        fileInput.value = '';
        return;
      }
      setAttachedFile(file);
    });

    removeFile.addEventListener('click', () => setAttachedFile(null));
    downloadBtn.addEventListener('click', downloadDialog);
    themeBtn.addEventListener('click', () => customizer.classList.add('show'));
    closeTheme.addEventListener('click', () => customizer.classList.remove('show'));
    customizer.addEventListener('click', (e) => {
      if (e.target === customizer) customizer.classList.remove('show');
    });
    document.querySelectorAll('.color-row input').forEach(el => el.addEventListener('input', saveTheme));
    resetTheme.addEventListener('click', () => {
      localStorage.removeItem('vitekTheme');
      location.reload();
    });

    clearBtn.addEventListener('click', () => {
      history.length = 0;
      transcript.length = 0;
      messagesEl.innerHTML = '';
      setAttachedFile(null);
      if ('speechSynthesis' in window) speechSynthesis.cancel();
      addBubble('Ну всё, память отшибло.', 'bot');
      transcript.push({ role: 'ВИТЁК', text: 'Ну всё, память отшибло.' });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      unlockVoice();

      const text = input.value.trim();
      if (!text && !attachedFile) return;

      input.value = '';
      send.disabled = true;

      let userText = text || 'Посмотри файл.';
      let sentToApi = userText;

      try {
        if (attachedFile) {
          const fileText = await fileToText(attachedFile);
          sentToApi += `\n\n[ПРИКРЕПЛЁН ФАЙЛ: ${attachedFile.name}]\n${fileText.slice(0, maxFileSize)}`;
          userText += `\n\n📎 ${attachedFile.name}`;
          setAttachedFile(null);
        }

        addBubble(userText, 'user');
        transcript.push({ role: 'ТЫ', text: userText });

        history.push({ role: 'user', content: sentToApi });

        const wait = addBubble('Витёк печатает...', 'bot');

        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history.slice(-6) })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'API не ответил');

        wait.textContent = cleanReply(data.reply || 'Не придумал что сказать.');
        history.push({ role: 'assistant', content: wait.textContent });
        transcript.push({ role: 'ВИТЁК', text: wait.textContent });
        speakVitek(wait.textContent);
      } catch (err) {
        addBubble('Ошибка: ' + err.message, 'bot');
      } finally {
        send.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
