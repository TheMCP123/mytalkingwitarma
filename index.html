<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Витёк Арматура</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(91, 141, 255, .24), transparent 34%),
        radial-gradient(circle at 90% 20%, rgba(160, 89, 255, .18), transparent 28%),
        #080a10;
      color: #f5f7fb;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .app {
      width: min(100%, 520px);
      height: min(760px, calc(100vh - 36px));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 28px;
      background: rgba(12, 15, 24, .76);
      box-shadow: 0 24px 70px rgba(0,0,0,.5);
      backdrop-filter: blur(18px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      height: 82px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,.09);
      background: rgba(255,255,255,.035);
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background:
        radial-gradient(circle at 35% 25%, rgba(255,255,255,.7), transparent 14%),
        linear-gradient(135deg, #5b8dff, #8f5cff);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 10px 28px rgba(91, 141, 255, .24);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      letter-spacing: -.08em;
      user-select: none;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -.03em;
      font-weight: 800;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: 86%;
      padding: 12px 14px;
      border-radius: 18px;
      white-space: pre-wrap;
      line-height: 1.38;
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .bot {
      align-self: flex-start;
      background: rgba(255,255,255,.09);
      border-bottom-left-radius: 6px;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #4f8cff, #8f5cff);
      border-bottom-right-radius: 6px;
    }

    form {
      display: flex;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid rgba(255,255,255,.09);
      background: rgba(255,255,255,.035);
    }

    input {
      flex: 1;
      min-width: 0;
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(0,0,0,.28);
      color: #fff;
      border-radius: 16px;
      padding: 14px 15px;
      outline: none;
      font: inherit;
    }

    input:focus {
      border-color: rgba(120,160,255,.75);
    }

    button {
      width: 50px;
      border: 0;
      border-radius: 16px;
      background: #f5f7fb;
      color: #111522;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    @media (max-width: 560px) {
      body {
        padding: 0;
      }

      .app {
        height: 100vh;
        border-radius: 0;
        width: 100%;
        border: 0;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header>
      <div class="avatar">ВА</div>
      <h1>Витёк Арматура</h1>
    </header>

    <section class="messages" id="messages"></section>

    <form id="form">
      <input id="input" autocomplete="off" placeholder="Напиши Витьку..." />
      <button id="send" type="submit">➜</button>
    </form>
  </main>

  <script>
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const messagesEl = document.getElementById('messages');

    const history = [];

    let selectedVoice = null;
    let voiceReady = false;

    function addBubble(text, type) {
      const el = document.createElement('div');
      el.className = 'bubble ' + type;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function loadVoice() {
      if (!('speechSynthesis' in window)) return;

      const voices = speechSynthesis.getVoices();

      selectedVoice =
        voices.find(v => v.lang === 'ru-RU') ||
        voices.find(v => v.lang && v.lang.startsWith('ru')) ||
        voices.find(v => v.lang && v.lang.startsWith('en')) ||
        voices[0] ||
        null;
    }

    function unlockVoice() {
      if (!('speechSynthesis' in window) || voiceReady) return;

      loadVoice();

      const test = new SpeechSynthesisUtterance(' ');
      test.volume = 0;

      speechSynthesis.speak(test);
      speechSynthesis.cancel();

      voiceReady = true;
    }

    function cleanForVoice(text) {
      return String(text || '')
        .replace(/[*_`~#>]/g, '')
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
        .replace(/https?:\/\/\S+/g, '')
        .replace(/[\u{1F300}-\u{1FAFF}]/gu, '')
        .replace(/\s+/g, ' ')
        .trim()
        .slice(0, 700);
    }

    function speakVitek(text) {
      if (!('speechSynthesis' in window)) return;

      const cleanText = cleanForVoice(text);
      if (!cleanText) return;

      loadVoice();
      speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(cleanText);

      utterance.lang = 'ru-RU';

      // Рофло-низкий голос Витька.
      utterance.rate = 0.95;
      utterance.pitch = 0.45;
      utterance.volume = 1;

      if (selectedVoice) {
        utterance.voice = selectedVoice;
      }

      speechSynthesis.speak(utterance);
    }

    if ('speechSynthesis' in window) {
      loadVoice();
      speechSynthesis.onvoiceschanged = loadVoice;
    }

    addBubble('Здарова мабой.', 'bot');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      unlockVoice();

      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      send.disabled = true;

      addBubble(text, 'user');

      history.push({
        role: 'user',
        content: text
      });

      const wait = addBubble('...', 'bot');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            messages: history.slice(-6)
          })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.error || 'API не ответил');
        }

        wait.textContent = data.reply || 'Не придумал что сказать.';

        history.push({
          role: 'assistant',
          content: wait.textContent
        });

        speakVitek(wait.textContent);
      } catch (err) {
        wait.textContent = 'Ошибка: ' + err.message;
      } finally {
        send.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
